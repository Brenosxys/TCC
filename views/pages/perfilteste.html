<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Perfil do Artista - Amnesia</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 30px; border-radius: 12px; width: 350px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        button { background: #6e45e2; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #5835c9; transform: scale(1.05); }
        .stats { margin: 20px 0; font-size: 1.2em; color: #444; border-top: 1px solid #eee; padding-top: 15px; }
    </style>
</head>
<body>

    <div class="card">
        <h1 id="nomeArtista">Amnesia Art</h1>
        <p id="bioArtista">Carregando biografia...</p>
        
        <div class="stats">
            <span id="contagemSeguidores">Seguidores: 0</span>
        </div>

        <button onclick="seguirArtista()">Seguir Artista</button>
    </div>

    <script>
        // Configurações de IDs (ajuste conforme seu banco)
        const idArtistaVisitado = 1; 
        const idUsuarioLogado = 2;

        // FUNÇÃO PARA CARREGAR OS DADOS
        async function carregarPerfil() {
            try {
                // Busca a contagem de seguidores
                const resSeguidores = await fetch(`http://localhost:3000/seguidores/contar/${idArtistaVisitado}`);
                
                if (!resSeguidores.ok) throw new Error("Erro na rota do servidor");

                const dadosSeguidores = await resSeguidores.json();
                document.getElementById('contagemSeguidores').innerText = `Seguidores: ${dadosSeguidores.total_seguidores}`;
                
            } catch (error) {
                console.error("Erro ao carregar perfil:", error);
            }
        }

        // FUNÇÃO PARA SEGUIR (Agora fora da anterior e com as chaves certas)
        async function seguirArtista() {
            try {
                const response = await fetch('http://localhost:3000/seguidores/seguir', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id_seguidor: idUsuarioLogado,
                        id_seguido: idArtistaVisitado
                    })
                });

                const resultado = await response.json();

                if (response.ok) {
                    alert("Sucesso: " + resultado.message);
                    carregarPerfil(); // Atualiza o número na tela sem dar F5
                } else {
                    alert("Aviso: " + (resultado.sqlMessage || "Erro ao seguir"));
                }
            } catch (error) {
                console.error("Erro na requisição:", error);
                alert("Não foi possível conectar ao servidor.");
            }
        }

        // Inicia a busca assim que a página abre
        carregarPerfil();
    </script>
</body>
</html>
